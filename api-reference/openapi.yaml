                  coelsaCode: "67REZ8NPQDQ460QK94KVGO"
                  accountId: "843d9d8b-6db8-47a2-8c22-23b198e99c15"
tags:
  - name: Transactions
    description: "Transaction Management - Create and manage transactions in the HG.Cash system. All transaction endpoints require authentication."
  - name: Accounts
    description: "Accounts - Retrieve account information and balances for the authenticated user. All account endpoints require authentication."
  - name: Reference Data
    description: "Reference Data - Get reference data like transaction statuses and types. These endpoints require authentication."
  - name: Webhooks
    description: "Webhooks - Event notifications sent to your HTTP endpoint."
  - name: Brazil
    description: "Transaction management - Create and manage transactions in Pix system for Brazil operations"